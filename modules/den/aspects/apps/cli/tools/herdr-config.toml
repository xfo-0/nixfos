[keys]
prefix = "ctrl+b"

focus_pane_left = "alt+c"
focus_pane_down = "alt+e"
focus_pane_up = "alt+n"
focus_pane_right = "alt+i"

swap_pane_left = "ctrl+alt+c"
swap_pane_down = "ctrl+alt+e"
swap_pane_up = "ctrl+alt+n"
swap_pane_right = "ctrl+alt+i"

navigate_pane_left = "c"
navigate_pane_down = "e"
navigate_pane_up = "n"
navigate_pane_right = "i"

split_vertical = "prefix+v"
split_horizontal = "prefix+minus"
close_pane = "prefix+x"
zoom = "prefix+z"
cycle_pane_next = "prefix+tab"
cycle_pane_previous = "prefix+shift+tab"
last_pane = "prefix+semicolon"
resize_mode = "prefix+r"
copy_mode = "prefix+space"
edit_scrollback = "prefix+y"

new_tab = "prefix+t"
previous_tab = "prefix+["
next_tab = "prefix+]"
switch_tab = "prefix+1..9"
rename_tab = "prefix+shift+t"
close_tab = "prefix+shift+x"

workspace_picker = "prefix+w"
new_workspace = "prefix+n"
rename_workspace = "prefix+shift+w"
close_workspace = "prefix+shift+d"
previous_workspace = "prefix+comma"
next_workspace = "prefix+period"
switch_workspace = "prefix+shift+1..9"
goto = "prefix+g"

new_worktree = "prefix+shift+g"
open_worktree = "prefix+ctrl+o"
remove_worktree = "prefix+ctrl+d"

focus_agent = "prefix+alt+1..9"

detach = "prefix+q"
toggle_sidebar = "prefix+b"

[ui.toast]
delivery = "system"
delay_seconds = 1

[theme]
name = "terminal"
